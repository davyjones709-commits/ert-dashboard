<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERT Lab Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Exo+2:wght@400;600;700&display=swap');
  :root{--bg:#f0f4ff;--surface:#fff;--surface2:#e8eeff;--border:#b0c0e8;--accent:#1a56db;--accent2:#e05c00;--green:#0a7c3e;--text:#0f172a;--muted:#475569;--danger:#dc2626;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  /* HEADER */
  .header{background:#1a56db;border-bottom:3px solid #f59e0b;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(26,86,219,0.3);}
  .header-left{display:flex;align-items:center;gap:14px;}
  .logo-icon{width:44px;height:44px;background:#f59e0b;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;color:#1a1a1a;}
  .header h1{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px;letter-spacing:2px;color:#fff;line-height:1.2;}
  .header-sub{font-size:11px;color:#bfdbfe;letter-spacing:2px;text-transform:uppercase;}
  .live-badge{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:6px 16px;font-family:'Share Tech Mono',monospace;font-size:12px;color:#fff;font-weight:700;}
  .live-dot{width:9px;height:9px;background:#10b981;border-radius:50%;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  /* MAIN */
  .main{max-width:1200px;margin:0 auto;padding:24px 20px;}
  /* STATS */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px;}
  .stat-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:18px 16px;text-align:center;box-shadow:0 2px 8px rgba(26,86,219,0.08);position:relative;overflow:hidden;}
  .stat-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--accent);border-radius:4px 0 0 4px;}
  .stat-num{font-family:'Share Tech Mono',monospace;font-size:36px;color:var(--accent);font-weight:700;line-height:1;}
  .stat-label{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:6px;}
  /* CONTROLS */
  .controls{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
  .search-input{flex:1;min-width:200px;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:10px 16px;font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--text);}
  .search-input:focus{outline:none;border-color:var(--accent);}
  .btn{padding:10px 20px;border-radius:10px;border:none;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 3px 10px rgba(26,86,219,0.25);}
  .btn-primary:hover{background:#1446b8;}
  .btn-success{background:#0a7c3e;color:#fff;}
  .btn-success:hover{background:#065f46;}
  .btn-outline{background:#fff;border:1.5px solid var(--accent);color:var(--accent);}
  .btn-danger{background:#fee2e2;border:1.5px solid var(--danger);color:var(--danger);}
  /* ── Audit Trail ── */
  .audit-entry{border:1.5px solid #e5e7eb;border-radius:10px;margin-bottom:12px;overflow:hidden;}
  .audit-header{background:#f8faff;padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #e5e7eb;flex-wrap:wrap;}
  .audit-badge{font-size:10px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:20px;text-transform:uppercase;}
  .audit-badge-edit{background:#dbeafe;color:#1d4ed8;}
  .audit-time{font-size:11px;color:#6b7280;font-family:'Share Tech Mono',monospace;}
  .audit-by{font-size:11px;font-weight:700;color:#374151;margin-left:auto;}
  .audit-reason{background:#fefce8;border:1px solid #fde68a;border-radius:6px;padding:6px 10px;font-size:12px;color:#92400e;margin:10px 14px 0;}
  .audit-reason span{font-weight:700;color:#78350f;}
  .audit-changes{padding:10px 14px;}
  .audit-change-row{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:12px;}
  .audit-change-row:last-child{border-bottom:none;}
  .audit-field{font-family:'Rajdhani',sans-serif;font-weight:700;color:#4b5563;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;min-width:110px;}
  .audit-from{color:#dc2626;font-family:'Share Tech Mono',monospace;text-decoration:line-through;opacity:0.8;}
  .audit-arrow{color:#9ca3af;font-size:14px;}
  .audit-to{color:#065f46;font-family:'Share Tech Mono',monospace;font-weight:700;}
  .audit-no-changes{color:#9ca3af;font-size:12px;font-style:italic;padding:10px 14px;}
  .audit-empty{text-align:center;padding:40px;color:#9ca3af;}
  .audit-empty-icon{font-size:40px;margin-bottom:10px;}
  .reason-modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;}
  .reason-box{background:#fff;border-radius:14px;padding:24px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
  .reason-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;color:#1a1a2e;margin-bottom:6px;}
  .reason-sub{font-size:12px;color:#6b7280;margin-bottom:16px;}
  .reason-input{width:100%;padding:10px 12px;border:1.5px solid #c7d2fe;border-radius:8px;font-size:13px;resize:vertical;font-family:'Rajdhani',sans-serif;box-sizing:border-box;}
  .reason-input:focus{outline:none;border-color:#4338ca;}
  /* TABLE */
  .table-wrap{background:#fff;border:1.5px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(26,86,219,0.08);margin-bottom:20px;}
  .table-head{padding:14px 20px;background:#eef2ff;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .table-head-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;}
  table{width:100%;border-collapse:collapse;}
  th{background:#eef2ff;padding:11px 14px;text-align:left;border-bottom:1.5px solid var(--border);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);white-space:nowrap;}
  td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:#f8faff;}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;font-family:'Share Tech Mono',monospace;}
  .badge-green{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;}
  .badge-blue{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd;}
  /* MODAL */
  .overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.7);z-index:500;align-items:center;justify-content:center;padding:20px;}
  .overlay.open{display:flex;}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:800px;max-height:90vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,0.2);}
  .modal-header{padding:20px 24px;background:var(--accent);border-radius:16px 16px 0 0;display:flex;align-items:center;justify-content:space-between;}
  .modal-header h2{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;letter-spacing:2px;color:#fff;text-transform:uppercase;}
  .modal-close{background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:20px;cursor:pointer;border-radius:6px;padding:4px 10px;font-weight:700;}
  .modal-body{padding:24px;}
  .info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
  .info-chip{background:#eef2ff;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;}
  .info-chip-label{font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;font-family:'Rajdhani',sans-serif;font-weight:700;}
  .info-chip-val{font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:700;color:var(--text);margin-top:2px;}
  .data-table{width:100%;border-collapse:collapse;margin-top:12px;}
  .data-table th{background:#eef2ff;color:var(--accent);padding:9px 10px;text-align:center;border:1.5px solid var(--border);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;}
  .data-table th.dir-col{background:#fff7ed;color:var(--accent2);text-align:left;padding-left:12px;}
  .data-table td{padding:9px 10px;border:1px solid var(--border);text-align:center;font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:600;}
  .data-table td.dir-name{background:#fff7ed;color:var(--accent2);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;text-align:left;padding-left:12px;}
  .data-table tr:nth-child(even) td{background:#f8faff;}
  .section-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin:20px 0 10px;display:flex;align-items:center;gap:8px;}
  .section-title::after{content:'';flex:1;height:1.5px;background:var(--border);}
  /* Toast */
  .toast{position:fixed;bottom:24px;right:24px;background:#0a7c3e;color:#fff;padding:12px 24px;border-radius:12px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;opacity:0;transition:all 0.3s;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,0.2);}
  .toast.show{opacity:1;}
  .toast.error{background:var(--danger);}
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-state .icon{font-size:64px;margin-bottom:16px;}
  .empty-state p{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;}
  .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(160deg,#1a56db 0%,#0f3a9e 50%,#0a2870 100%);}
  .login-card{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
  .login-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;}
  .login-logo-icon{width:64px;height:64px;background:#f59e0b;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;color:#1a1a1a;margin-bottom:12px;}
  .login-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:20px;letter-spacing:1px;color:#0f172a;text-align:center;}
  .login-sub{font-size:11px;color:#64748b;letter-spacing:2px;text-transform:uppercase;margin-top:4px;text-align:center;}
  .login-field{margin-bottom:16px;}
  .login-label{font-size:10px;letter-spacing:1.5px;color:#475569;text-transform:uppercase;font-family:'Rajdhani',sans-serif;font-weight:700;margin-bottom:6px;display:block;}
  .login-input{background:#f0f4ff;border:1.5px solid #b0c0e8;border-radius:10px;padding:13px 16px;color:#0f172a;font-family:'Share Tech Mono',monospace;font-size:15px;font-weight:600;width:100%;}
  .login-input:focus{outline:none;border-color:#1a56db;background:#fff;}
  .login-btn{background:#1a56db;color:#fff;border:none;border-radius:10px;padding:14px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;width:100%;box-shadow:0 4px 14px rgba(26,86,219,0.35);}
  .login-btn:disabled{opacity:0.6;cursor:not-allowed;}
  .login-error{background:#fee2e2;border:1.5px solid #dc2626;border-radius:8px;padding:10px 14px;font-size:13px;color:#dc2626;font-family:'Share Tech Mono',monospace;margin-bottom:14px;display:none;}
  .login-error.show{display:block;}
</style>

<script>
// ─── FIREBASE ─────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAF2W1hyP_v5r9000oa69PpYPL-dfKpFHQ",
  authDomain: "ert-of-earth.firebaseapp.com",
  databaseURL: "https://ert-of-earth-default-rtdb.firebaseio.com",
  projectId: "ert-of-earth",
  storageBucket: "ert-of-earth.firebasestorage.app",
  messagingSenderId: "582565101855",
  appId: "1:582565101855:web:c51acb35fffcb695d4b02a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// ─── AUTH ─────────────────────────────────────────────────────────────────────
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboardMain').style.display = 'block';
    document.getElementById('adminEmail').textContent = user.email;
    initDashboard();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboardMain').style.display = 'none';
  }
});

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');
  if (!email || !password) { showLoginError('Enter email and password'); return; }
  btn.disabled = true; btn.textContent = '⟳ Logging in...';
  err.classList.remove('show');
  try {
    await auth.signInWithEmailAndPassword(email, password);
  } catch(e) {
    btn.disabled = false; btn.textContent = '🔒 LOGIN TO DASHBOARD';
    let msg = 'Login failed. Check email and password.';
    if(e.code==='auth/wrong-password') msg='Wrong password.';
    if(e.code==='auth/user-not-found') msg='User not found.';
    if(e.code==='auth/invalid-email') msg='Invalid email format.';
    if(e.code==='auth/invalid-credential') msg='Invalid email or password.';
    if(e.code==='auth/too-many-requests') msg='Too many attempts. Try later.';
    if(e.code==='auth/network-request-failed') msg='Network error. Check internet connection.';
    showLoginError(msg);
    console.error('Auth error:', e.code, e.message);
  }
}
function showLoginError(msg) {
  const e=document.getElementById('loginError'); e.textContent='⚠ '+msg; e.classList.add('show');
}
function doLogout() {
  if (confirm('Logout from Lab Dashboard?')) auth.signOut();
}
document.addEventListener('keydown', e => {
  if (e.key==='Enter' && document.getElementById('loginScreen').style.display!=='none') doLogin();
});

// ─── GLOBAL VARIABLES (declared outside initDashboard) ─────────────────────────
let allTests = [];
let filteredTests = [];
let photos = {};
let currentDetailTest = null;
let isDashboardInitialized = false; // Guard against multiple initializations

function initDashboard() {

// Prevent multiple initializations
if(isDashboardInitialized) return;
isDashboardInitialized = true;

// Reset these when dashboard initializes
allTests = [];
filteredTests = [];
photos = {};
currentDetailTest = null;

// ─── CONNECTION ───────────────────────────────────────────────────────────────
db.ref('.info/connected').on('value', snap => {
  const el = document.getElementById('connStatus');
  el.textContent = snap.val() ? 'Live — Connected' : 'Offline';
});

// ─── LOAD DATA ────────────────────────────────────────────────────────────────
db.ref('tests').on('value', snap => {
  allTests = [];
  snap.forEach(child => {
    const t = { ...child.val(), id: child.key };
    // Restore dots in spacings (Firebase keys used underscores)
    if(t.spacingsRaw) {
      t.spacings = t.spacingsRaw;
    } else if(t.spacings) {
      t.spacings = t.spacings.map(s=>String(s).replace(/_/g,'.'));
    }
    // Restore dots in readings keys
    if(t.readings){
      const fixed={};
      Object.keys(t.readings).forEach(dir=>{
        fixed[dir]={};
        Object.keys(t.readings[dir]).forEach(sp=>{
          const realSp=String(sp).replace(/_/g,'.');
          fixed[dir][realSp]=t.readings[dir][sp];
        });
      });
      t.readings=fixed;
    }
    allTests.push(t);
  });
  allTests.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
  updateStats();
  filterTests();
  renderTable();  // Ensure table renders when data loads
});

db.ref('photos').on('value', snap => {
  photos = {};
  snap.forEach(child => {
    const val = child.val();
    // Handle both old single photo and new multiple photos
    if(val && val.photo) {
      photos[child.key] = [val.photo]; // old format — single photo
    } else if(val && typeof val === 'object') {
      // New format — multiple indexed photos
      const arr = [];
      Object.keys(val).sort().forEach(k => {
        if(val[k] && val[k].photo) arr.push(val[k].photo);
      });
      if(arr.length) photos[child.key] = arr;
    }
  });
});

// ─── STATS ────────────────────────────────────────────────────────────────────
function updateStats() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('statTotal').textContent = allTests.length;
  document.getElementById('statToday').textContent = allTests.filter(t => t.testDate === today).length;
  document.getElementById('statSites').textContent = [...new Set(allTests.map(t => t.jobNumber))].length;
  // NOTE: Removed statPhotos (With Signature card no longer exists)
}

// ─── FILTER ───────────────────────────────────────────────────────────────────
function filterTests() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const dateFrom = document.getElementById('dateFrom').value;
  const dateTo = document.getElementById('dateTo').value;
  filteredTests = allTests.filter(t => {
    const matchSearch = !q ||
      (t.jobNumber||'').toLowerCase().includes(q) ||
      (t.testNumber||'').toLowerCase().includes(q) ||
      (t.pointOf||'').toLowerCase().includes(q) ||
      (t.cityName||'').toLowerCase().includes(q) ||
      (t.stateName||'').toLowerCase().includes(q) ||
      (t.location||'').toLowerCase().includes(q);
    const matchFrom = !dateFrom || (t.testDate||'') >= dateFrom;
    const matchTo = !dateTo || (t.testDate||'') <= dateTo;
    return matchSearch && matchFrom && matchTo;
  });
  renderTable();
}

function filterByJob(jobNo) {
  document.getElementById('searchInput').value = jobNo;
  filterTests();
}

function toggleSelectAll(cb) {
  document.querySelectorAll('.rowCheck').forEach(c => c.checked = cb.checked);
  updateBulkBar();
}

function updateBulkBar() {
  const selected = document.querySelectorAll('.rowCheck:checked');
  const bar = document.getElementById('bulkBar');
  const count = document.getElementById('bulkCount');
  if (selected.length > 0) {
    bar.style.display = 'flex';
    count.textContent = `${selected.length} selected`;
  } else {
    bar.style.display = 'none';
  }
}

function clearSelection() {
  document.querySelectorAll('.rowCheck').forEach(c => c.checked = false);
  const sa = document.getElementById('selectAll');
  if(sa) sa.checked = false;
  updateBulkBar();
}

function getSelectedIds() {
  return [...document.querySelectorAll('.rowCheck:checked')].map(c => c.value);
}

async function deleteSelected() {
  const ids = getSelectedIds();
  if (!ids.length) return;
  if (!confirm(`Delete ${ids.length} selected test(s)? This cannot be undone.`)) return;
  for (const id of ids) {
    await db.ref('tests/'+id).remove();
    await db.ref('photos/'+id).remove();
  }
  showToast(`✔ ${ids.length} test(s) deleted`);
}

function exportSelectedExcel() {
  const ids = getSelectedIds();
  if (!ids.length) { showToast('No tests selected', true); return; }
  const selected = allTests.filter(t => ids.includes(t.id));
  const wb = buildWorkbook(selected);
  XLSX.writeFile(wb, `ERT_Selected_${new Date().toISOString().split('T')[0]}.xlsx`);
  showToast(`✔ Exported ${selected.length} test(s)`);
}

async function saveEditedData() {
  const t = currentDetailTest;
  if (!t) return;
  
  // Collect edited values
  const updates = {
    jobNumber: document.getElementById('edit_jobNumber').value.trim(),
    testNumber: document.getElementById('edit_testNumber').value.trim(),
    pointOf: document.getElementById('edit_pointOf').value.trim(),
    testDate: document.getElementById('edit_testDate').value,
    temperature: document.getElementById('edit_temperature').value,
    humidity: document.getElementById('edit_humidity').value,
    cityName: document.getElementById('edit_cityName').value.trim(),
    stateName: document.getElementById('edit_stateName').value.trim(),
    witnessed: document.getElementById('edit_witnessed').value,
    witnessName: document.getElementById('edit_witnessName')?.value.trim() || '',
    location: document.getElementById('edit_location').value.trim(),
    remarks: document.getElementById('edit_remarks').value.trim(),
    testedBy: document.getElementById('edit_testedBy').value.trim()
  };
  
  // Collect edited readings — ALL readings
  const newReadings = {};
  document.querySelectorAll('.edit-reading').forEach(input => {
    const dir = input.dataset.dir;
    const sp = input.dataset.sp;
    const val = input.value.trim();
    if(!newReadings[dir]) newReadings[dir] = {};
    if(val !== '') newReadings[dir][sp] = val;
  });
  Object.keys(newReadings).forEach(dir => {
    if(Object.keys(newReadings[dir]).length === 0) delete newReadings[dir];
  });
  if(Object.keys(newReadings).length > 0) updates.readings = newReadings;
  
  // Validate required fields
  if(!updates.jobNumber || !updates.testNumber) {
    showToast('Job Number and Test Number are required', true);
    return;
  }
  
  // ── Detect what actually changed (for audit log) ──
  const fieldLabels = {
    jobNumber:'Job Number', testNumber:'Test Number', pointOf:'Point Id',
    testDate:'Date', temperature:'Temperature', humidity:'Humidity',
    cityName:'City/Village', stateName:'State', witnessed:'Witnessed',
    witnessName:'Representative Name', location:'Location',
    remarks:'Remarks', testedBy:'Tested By'
  };
  const changes = {};
  Object.keys(fieldLabels).forEach(key => {
    const oldVal = String(t[key]||'');
    const newVal = String(updates[key]||'');
    if(oldVal !== newVal) changes[key] = {from: oldVal||'(empty)', to: newVal||'(empty)', label: fieldLabels[key]};
  });
  // Check reading changes
  if(updates.readings) {
    const oldReadings = t.readings || {};
    const readingChanges = {};
    Object.keys(updates.readings).forEach(dir => {
      Object.keys(updates.readings[dir]).forEach(sp => {
        const oldVal = String((oldReadings[dir]||{})[sp]||'');
        const newVal = String(updates.readings[dir][sp]||'');
        if(oldVal !== newVal) readingChanges[`${dir} @ ${sp}m`] = {from:oldVal||'(empty)', to:newVal||'(empty)'};
      });
    });
    if(Object.keys(readingChanges).length > 0) changes['readings'] = readingChanges;
  }
  
  // ── Show reason prompt modal ──
  const reason = await showReasonPrompt(changes);
  if(reason === null) return; // user cancelled
  
  try {
    // Prepare Firebase update
    const fbUpdates = {...updates};
    if(Object.keys(newReadings).length > 0) {
      const fbReadings = {};
      Object.keys(newReadings).forEach(dir => {
        fbReadings[dir] = {};
        Object.keys(newReadings[dir]).forEach(sp => {
          fbReadings[dir][String(sp).replace(/\./g,'_')] = newReadings[dir][sp];
        });
      });
      fbUpdates.readings = fbReadings;
    } else {
      delete fbUpdates.readings;
    }
    delete fbUpdates.spacings;
    delete fbUpdates.directions;
    delete fbUpdates.spacingsRaw;
    fbUpdates.editedAt = new Date().toISOString();
    fbUpdates.editedFrom = 'dashboard';
    
    // ── Write Audit Log to Firebase ──
    const logEntry = {
      testId: String(t.id),
      jobNumber: t.jobNumber,
      testNumber: t.testNumber,
      pointOf: t.pointOf,
      editedAt: new Date().toISOString(),
      editedBy: auth.currentUser ? auth.currentUser.email : 'admin',
      reason: reason || '',
      changes: changes
    };
    await db.ref(`editLogs/${t.id}`).push(logEntry);
    
    // Update test in Firebase
    await db.ref(`tests/${t.id}`).update(fbUpdates);
    
    // Send remote update command to staff device
    if(t.userEmail){
      const safeEmail = t.userEmail.replace(/[.#$\/\[\]]/g,'_');
      await db.ref('commands/'+safeEmail).push({
        action: 'update', testId: String(t.id), updates: fbUpdates, at: Date.now()
      });
    }
    
    // Update local object
    Object.assign(t, updates);
    showToast('✔ Changes saved & audit log written!');
    cancelEditMode();
  } catch(err) {
    console.error('Save error:', err);
    showToast('Error saving: ' + err.message, true);
  }
}

// ── Reason Prompt Modal ──────────────────────────────────────────────────────
function showReasonPrompt(changes) {
  return new Promise(resolve => {
    const existing = document.getElementById('reasonModal');
    if(existing) existing.remove();
    
    const changeCount = Object.keys(changes).length;
    const modal = document.createElement('div');
    modal.id = 'reasonModal';
    modal.className = 'reason-modal';
    
    // Build change summary
    let changeSummary = '';
    if(changeCount === 0) {
      changeSummary = '<div style="color:#9ca3af;font-size:12px;font-style:italic;">No changes detected.</div>';
    } else {
      changeSummary = Object.entries(changes).map(([key,val])=>{
        if(key === 'readings') {
          return Object.entries(val).map(([cell,v])=>
            `<div class="audit-change-row"><span class="audit-field">📊 ${cell}</span><span class="audit-from">${v.from}</span><span class="audit-arrow">→</span><span class="audit-to">${v.to}</span></div>`
          ).join('');
        }
        return `<div class="audit-change-row"><span class="audit-field">${val.label}</span><span class="audit-from">${val.from}</span><span class="audit-arrow">→</span><span class="audit-to">${val.to}</span></div>`;
      }).join('');
    }
    
    modal.innerHTML = `
      <div class="reason-box">
        <div class="reason-title">💾 Save Changes</div>
        <div class="reason-sub">${changeCount} field(s) changed. Review and optionally provide a reason.</div>
        <div style="border:1.5px solid #e5e7eb;border-radius:8px;padding:10px;max-height:160px;overflow-y:auto;margin-bottom:14px;background:#fafafa;">
          ${changeSummary}

      document.getElementById('modalBody').innerHTML = `
        <div class="audit-empty">
          <div class="audit-empty-icon">📋</div>
          <div style="font-weight:700;font-size:14px;color:#374151;">No edit history</div>
          <div style="font-size:12px;margin-top:6px;">This test has not been edited from the dashboard yet.</div>

    }
    
    let html = `<div style="margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:12px;color:#6b7280;">${logs.length} edit(s) recorded</div>
      <button onclick="exportAuditCSV('${t.id}')" style="padding:5px 12px;border-radius:6px;border:1.5px solid #c7d2fe;background:#eef2ff;color:#3730a3;font-size:11px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;">⬇ Export CSV</button>
    </div>`;
    
    logs.forEach(log => {
      const dt = new Date(log.editedAt);
      const dateStr = dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
      const timeStr = dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
      const fromApp = log.editedFrom === 'app';
      const sourceBadge = fromApp
        ? `<span class="audit-badge" style="background:#dcfce7;color:#166534;">📱 App</span>`
        : `<span class="audit-badge" style="background:#e0e7ff;color:#3730a3;">🖥 Dashboard</span>`;
      
      const changes = log.changes || {};
      const changeCount = Object.keys(changes).length;
      
      html += `<div class="audit-entry">
        <div class="audit-header">
          <span class="audit-badge audit-badge-edit">✏️ Edit</span>
          ${sourceBadge}
          <span class="audit-time">${dateStr} &nbsp;${timeStr}</span>
          <span class="audit-by">👤 ${log.editedBy||'unknown'}</span>
        </div>`;
      
      if(log.reason) {
        html += `<div class="audit-reason"><span>Reason: </span>${log.reason}</div>`;
      }
      
      if(changeCount === 0) {
        html += `<div class="audit-no-changes">No field changes recorded.</div>`;
      } else {
        html += `<div class="audit-changes">`;
        Object.entries(changes).forEach(([key, val]) => {
          if(key === 'readings') {
            Object.entries(val).forEach(([cell, v]) => {
              html += `<div class="audit-change-row">
                <span class="audit-field">📊 ${cell}</span>
                <span class="audit-from">${v.from}</span>
                <span class="audit-arrow">→</span>

              <span class="audit-field">${val.label||key}</span>
              <span class="audit-from">${val.from}</span>
              <span class="audit-arrow">→</span>
              <span class="audit-to">${val.to}</span>
            </div>`;
          }
        });
        html += `</div>`;
      }
      html += `</div>`;
    });
    
    document.getElementById('modalBody').innerHTML = html;
  });
}

// ── Export Audit Trail as CSV ─────────────────────────────────────────────────
function exportAuditCSV(testId) {
  db.ref(`editLogs/${testId}`).orderByChild('editedAt').once('value', snap => {
    const logs = [];
    snap.forEach(child => logs.push(child.val()));
    if(!logs.length) { showToast('No audit logs to export', true); return; }
    
    const rows = [['Test ID','Job No','Test No','Point Id','Edited At','Edited By','Edited From','Reason','Field','From','To']];
    logs.forEach(log => {
      const changes = log.changes || {};
      const changeEntries = [];
      Object.entries(changes).forEach(([key, val]) => {
        if(key === 'readings') {
          Object.entries(val).forEach(([cell, v]) => changeEntries.push([`Reading: ${cell}`, v.from, v.to]));
        } else {
          changeEntries.push([val.label||key, val.from, val.to]);
        }
      });
      if(changeEntries.length === 0) changeEntries.push(['(no changes)', '', '']);
      changeEntries.forEach(([field, from, to]) => {
        rows.push([
          log.testId, log.jobNumber, log.testNumber, log.pointOf,
          new Date(log.editedAt).toLocaleString('en-IN'),
          log.editedBy||'unknown', log.editedFrom||'dashboard',
          log.reason||'', field, from, to
        ]);
      });
    });
    
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `AuditTrail_${currentDetailTest?.jobNumber||testId}_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    showToast('✔ Audit Trail CSV exported!');
  });
}

function buildWorkbook(testList) {
  const wb = XLSX.utils.book_new();
  // Summary
  const sumData = [
    ['ERT FIELD DATA — SUMMARY REPORT'],
    ['Exported:', new Date().toLocaleString()],
    ['Total Tests:', testList.length],
    [],
    ['Job No','Test No','Point Id','Date','Location','Temp (°C)','Humidity (%)','Directions','Spacings']
  ];
  testList.forEach(t => {
    sumData.push([t.jobNumber,t.testNumber,t.pointOf,t.testDate,t.location||'',t.temperature||'',t.humidity||'',(t.directions||[]).join(', '),(t.spacings||[]).join(', ')]);
  });
  const ws0 = XLSX.utils.aoa_to_sheet(sumData);
  ws0['!cols'] = [14,12,14,12,24,10,12,34,20].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws0, 'SUMMARY');

  // Per test — grid format
  const usedSheetNames = new Set(['SUMMARY']);
  testList.forEach((t, idx) => {
    const rows = [];
    rows.push(['Job Number:', t.jobNumber, '', 'Test Number:', t.testNumber]);
    rows.push(['Point Id:', t.pointOf, '', 'Date:', t.testDate]);
    rows.push(['Location:', t.location||'', '', 'Temperature (°C):', t.temperature||'']);
    rows.push(['Humidity (%):', t.humidity||'', '', 'City/Village:', t.cityName||'']);
    rows.push(['State:', t.stateName||'', '', '', '']);
    rows.push(['Witnessed by Client:', t.witnessed||'No', '', 'Representative Name:', t.witnessName||'']);
    rows.push(['Remarks:', t.remarks||'', '', '', '']);
    rows.push([]);
    rows.push(['', 'Resistance of Soil (Ω) at Specified Distances Between Electrodes (m)']);
    rows.push([]);
    rows.push(['Direction', ...(t.spacings||[]).map(sp=>`${sp} m`)]);
    (t.directions||[]).forEach(dir => {
      const row = [dir];
      (t.spacings||[]).forEach(sp => {
        const val=(t.readings||{})[dir]?.[sp];
        row.push(val!==undefined&&val!==''?parseFloat(val):'');
      });
      rows.push(row);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:16},...(t.spacings||[]).map(()=>({wch:14}))];
    if ((t.spacings||[]).length > 0) ws['!merges'] = [{s:{r:5,c:1},e:{r:5,c:(t.spacings||[]).length}}];
    
    // Create unique sheet name to avoid duplicates
    let sname = `${t.jobNumber}_${t.testNumber}`.replace(/[\\/:*?[\]]/g,'_').substring(0,31);
    let uniqueName = sname;
    let counter = 1;
    while(usedSheetNames.has(uniqueName)) {
      counter++;
      uniqueName = sname.substring(0, 28) + '_' + counter;
    }
    usedSheetNames.add(uniqueName);
    
    XLSX.utils.book_append_sheet(wb, ws, uniqueName);
  });
  return wb;
}

// Helper function to fetch signatures and then export PDF
function fetchSignaturesAndExportPDF(testList, type) {
  let sigFetched = 0;
  const totalToFetch = testList.length;
  
  if(totalToFetch === 0) { buildAndSavePDF(testList, type); return; }
  
  testList.forEach(t => {
    db.ref(`signatures/${t.id}`).once('value', sigSnap => {
      if(sigSnap.exists()) t.signature = sigSnap.val().sig;
      
      db.ref(`witnessSigs/${t.id}`).once('value', witSnap => {
        if(witSnap.exists()) t.witnessSig = witSnap.val().sig;
        
        sigFetched++;
        if(sigFetched === totalToFetch) {
          buildAndSavePDF(testList, type);
        }
      });
    });
  });
}

function buildAndSavePDF(testList, type) {
  if(!window.jspdf){showToast('PDF library loading...',true);return;}
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
  
  testList.forEach((t, ti) => {
    if(ti > 0) doc.addPage();
    buildPDFPage(doc, t);
  });
  
  // Footer on each page
  const pageCount = doc.getNumberOfPages();
  for(let p = 1; p <= pageCount; p++){
    doc.setPage(p);
    doc.setFillColor(240, 242, 255);
    doc.rect(0, 290, 210, 7, 'F');
    doc.setTextColor(100, 100, 150);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    doc.text('Shreenath Laboratories & Consultants Pvt. Ltd. | ERT Field Report', 14, 295);
    doc.text(`Page ${p} of ${pageCount}`, 196, 295, {align:'right'});
  }
  
  const fname = `ERT_${type}_${new Date().toISOString().split('T')[0]}.pdf`;
  doc.save(fname);
  showToast(`✔ PDF with ${testList.length} test(s) exported!`);
}

function buildPDFPage(doc,t){
  const pw=210,mg=14;let y=mg;
  doc.setFillColor(26,86,219);doc.rect(0,0,pw,22,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(13);
  doc.text('Shreenath Laboratories & Consultants Pvt. Ltd.',pw/2,9,{align:'center'});
  doc.setFont('helvetica','normal');doc.setFontSize(8);
  doc.text('ELECTRICAL RESISTIVITY TEST OF EARTH — FIELD DATA REPORT',pw/2,15,{align:'center'});
  y=28;
  const boxH=60;
  doc.setFillColor(245,247,255);doc.rect(mg,y,pw-mg*2,boxH,'F');
  doc.setDrawColor(180,200,240);doc.setLineWidth(0.3);doc.rect(mg,y,pw-mg*2,boxH,'S');
  doc.line(pw/2,y,pw/2,y+boxH);
  const lx=mg+4,rx=pw/2+4,lv=mg+38,rv=pw/2+38;
  let ly=y+8,ry=y+8;
  const lbl=(x,yy,txt)=>{doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(80,80,180);doc.text(txt,x,yy);};
  const val=(x,yy,txt)=>{doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(20,20,20);doc.text(String(txt||'—'),x,yy);};
  lbl(lx,ly,'Job Number:');val(lv,ly,t.jobNumber);ly+=7;
  lbl(lx,ly,'Point ID:');val(lv,ly,t.pointOf);ly+=7;
  lbl(lx,ly,'Temperature:');val(lv,ly,t.temperature?t.temperature+'°C':'—');ly+=7;
  lbl(lx,ly,'City/Village:');val(lv,ly,t.cityName||'—');ly+=7;
  lbl(lx,ly,'Witnessed:');val(lv,ly,t.witnessed||'No');ly+=7;
  lbl(lx,ly,'Representative:');val(lv,ly,t.witnessName||'—');
  lbl(rx,ry,'Test Number:');val(rv,ry,t.testNumber);ry+=7;
  lbl(rx,ry,'Date:');val(rv,ry,t.testDate);ry+=7;
  lbl(rx,ry,'Humidity:');val(rv,ry,t.humidity?t.humidity+'%':'—');ry+=7;
  lbl(rx,ry,'State:');val(rv,ry,t.stateName||'—');ry+=7;
  lbl(rx,ry,'Tested By:');val(rv,ry,t.testedBy||'—');ry+=7;
  if(t.createdAt){lbl(rx,ry,'Time:');val(rv,ry,new Date(t.createdAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true}));}
  y+=boxH+3;
  doc.setFillColor(235,240,255);doc.rect(mg,y,pw-mg*2,8,'F');
  doc.setDrawColor(180,200,240);doc.rect(mg,y,pw-mg*2,8,'S');
  lbl(mg+4,y+5.5,'Location (UTM):');
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(20,20,20);
  doc.text(String(t.location||'—'),mg+38,y+5.5);
  y+=12;
  doc.setFont('helvetica','bolditalic');doc.setFontSize(8);doc.setTextColor(80,80,80);
  doc.text('Resistance of Soil (Ohm) at Specified Distances Between Electrodes (m)',pw/2,y,{align:'center'});
  y+=5;
  const tSpacings=t.spacings||[];
  const dirs=t.directions||[];
  const dirColW=40;
  const dataColW=(pw-mg*2-dirColW)/Math.max(tSpacings.length,1);
  const rowH=7;
  doc.setFillColor(26,86,219);doc.rect(mg,y,pw-mg*2,rowH,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(8);
  doc.text('Direction',mg+2,y+4.8);
  tSpacings.forEach((sp,j)=>{doc.text(`${sp} m`,mg+dirColW+j*dataColW+dataColW/2,y+4.8,{align:'center'});});
  y+=rowH;
  dirs.forEach((dir,ri)=>{
    if(y+rowH>282){doc.addPage();y=20;}
    doc.setFillColor(...(ri%2===0?[242,246,255]:[255,255,255]));doc.rect(mg,y,pw-mg*2,rowH,'F');
    doc.setDrawColor(210,220,240);doc.rect(mg,y,pw-mg*2,rowH,'S');
    doc.setTextColor(30,30,30);doc.setFont('helvetica','bold');doc.setFontSize(8);
    doc.text(dir,mg+2,y+4.8);
    doc.setFont('helvetica','normal');
    tSpacings.forEach((sp,j)=>{
      const readings=t.readings&&t.readings[dir];
      const spK=String(sp),spU=spK.replace(/\./g,'_');
      const v=readings&&(readings[spK]!==undefined&&readings[spK]!==''?readings[spK]:readings[spU]!==undefined&&readings[spU]!==''?readings[spU]:null);
      doc.text(v!==null&&v!==undefined?String(v):'—',mg+dirColW+j*dataColW+dataColW/2,y+4.8,{align:'center'});
    });
    y+=rowH;
  });
  // Legend for special values
  const allVals=Object.values(t.readings||{}).flatMap(d=>Object.values(d));
  const usedOL=allVals.includes('OL'),usedBR=allVals.includes('BR'),usedGR=allVals.includes('GR');
  if(usedOL||usedBR||usedGR){
    y+=3;
    doc.setFillColor(248,250,255);doc.rect(mg,y,pw-mg*2,8,'F');
    doc.setDrawColor(200,210,230);doc.rect(mg,y,pw-mg*2,8,'S');
    doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(100,100,120);
    doc.text('Legend:',mg+2,y+5);
    let lx=mg+22;
    if(usedOL){doc.setTextColor(180,0,0);doc.setFont('helvetica','bold');doc.text('OL',lx,y+5);doc.setFont('helvetica','normal');doc.text(' = Overload',lx+5,y+5);lx+=38;}
    if(usedBR){doc.setTextColor(180,100,0);doc.setFont('helvetica','bold');doc.text('BR',lx,y+5);doc.setFont('helvetica','normal');doc.text(' = Boundary Restriction',lx+5,y+5);lx+=65;}
    if(usedGR){doc.setTextColor(0,120,80);doc.setFont('helvetica','bold');doc.text('GR',lx,y+5);doc.setFont('helvetica','normal');doc.text(' = Ground Restriction',lx+5,y+5);}
    y+=10;
  }
  y+=3;
  if(t.remarks){
    if(y+15>280){doc.addPage();y=20;}
    doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(80,0,160);
    doc.text('Remarks / Observations',mg,y);y+=5;
    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(30,30,30);
    const rl=doc.splitTextToSize(t.remarks,pw-mg*2);
    doc.text(rl,mg,y);y+=rl.length*4.5+4;
  }
  if(t.testedBy||t.signature||t.witnessSig){
    if(y+38>280){doc.addPage();y=20;}
    doc.setDrawColor(200,200,200);doc.line(mg,y,pw-mg,y);y+=6;
    const midX=pw/2+2;
    const addSig=(src,x,sy,w,h)=>{
      if(!src||src.length<10)return;
      try{
        const fmt=src.indexOf('data:image/png')===0?'PNG':'JPEG';
        doc.addImage(src,fmt,x,sy,w,h);
      }catch(e){console.log('sig error',e);}
    };
    // Tester box
    doc.setFillColor(238,242,255);doc.rect(mg,y,pw/2-mg-2,32,'F');
    doc.setDrawColor(199,210,254);doc.rect(mg,y,pw/2-mg-2,32,'S');
    doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(67,56,202);
    doc.text('TESTED BY',mg+2,y+5);
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(30,27,75);
    doc.text(String(t.testedBy||'—'),mg+2,y+12);
    if(t.signature) addSig(t.signature,mg+2,y+15,42,15);
    // Witness box
    if(t.witnessed==='Yes'){
      doc.setFillColor(209,250,229);doc.rect(midX,y,pw/2-mg-2,32,'F');
      doc.setDrawColor(110,231,183);doc.rect(midX,y,pw/2-mg-2,32,'S');
      doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(6,95,70);
      doc.text('WITNESSED BY',midX+2,y+5);
      doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(6,78,59);
      doc.text(String(t.witnessName||'—'),midX+2,y+12);
      if(t.witnessSig) addSig(t.witnessSig,midX+2,y+15,42,15);
    }
  }
}

// ─── REFRESH ──────────────────────────────────────────────────────────────────
function refreshData() { showToast('Data refreshed from Firebase'); filterTests(); updateStats(); }

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg, isError=false) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(isError?' error':'')+' show';
  setTimeout(()=>t.classList.remove('show'),2800);
}

window.enterEditMode = enterEditMode;

window.exportSelectedExcel = exportSelectedExcel;

window.downloadPhoto = function(id) {
  const arr = photos[id];
  if(!arr||!arr.length){showToast('No photos for this test',true);return;}
  arr.forEach((ph,i) => {
    const t = allTests.find(x => x.id === id);
    const fname = `${(t?.pointOf||'photo').replace(/[^a-zA-Z0-9_-]/g,'_')}_${i+1}.jpg`;
    const a = document.createElement('a');
    a.href = ph; a.download = fname;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  });
};
window.downloadSinglePhoto = function(id, idx) {
  const arr = photos[id];
  if(!arr||!arr[idx]){showToast('Photo not found',true);return;}
  const t = allTests.find(x => x.id === id);
  const fname = `${(t?.pointOf||'photo').replace(/[^a-zA-Z0-9_-]/g,'_')}_${idx+1}.jpg`;
  const a = document.createElement('a');
  a.href = arr[idx]; a.download = fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
};
